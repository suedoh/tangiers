services:
  mongodb:
    image: mongo:7.0
    container_name: ace_mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ace
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ace_trading
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Ace scheduled-task host (Phase B.5+ — previously audit-cron).
  # Runs every cron job that does NOT need TradingView CDP:
  #   - Mongo sync (hourly :55)
  #   - BloFin order reconciliation (every 3 min)
  #   - Discord bot (every minute)
  #   - BTC / BZ / Poly weekly reports
  #   - EW backtest + daily/weekly/monthly reports
  #   - Mid-week audit (formerly the only entry)
  #
  # The four CDP-bound triggers (BTC/BZ/Poly trigger-check + EW run.js) stay
  # on the host crontab — Docker for Mac can't reach localhost:9222.
  #
  # Verify it's running:    docker compose ps ace-cron
  # See its logs:           docker logs ace_cron
  # Trigger one manually:   docker compose exec ace-cron node /app/scripts/blofin/recon-once.js
  # Add/remove a job:       edit scripts/cron/ace.crontab + `docker compose restart ace-cron`
  ace-cron:
    image: node:20-alpine
    container_name: ace_cron
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URL: "mongodb://ace:${MONGO_PASSWORD}@mongodb:27017/ace_trading?authSource=admin"
      TZ: UTC
    command:
      - sh
      - -c
      - |
        mkdir -p /app/logs /app/notes/audits /etc/crontabs &&
        cp /app/scripts/cron/ace.crontab /etc/crontabs/root &&
        echo 'ace-cron: crontab installed, starting crond' &&
        crond -f -l 8

volumes:
  mongo_data:
    driver: local
