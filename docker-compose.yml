services:
  mongodb:
    image: mongo:7.0
    container_name: ace_mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ace
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ace_trading
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Mid-week audit cron — runs win-rate-diff.js every Wednesday 13:00 UTC
  # and writes output to notes/audits/. Output files persist on the host via
  # the bind mount; the container itself is stateless.
  #
  # Verify it's running:    docker compose ps audit-cron
  # See its logs:           docker logs ace_audit_cron
  # Trigger manually:       docker compose exec audit-cron /app/scripts/audit/run-mid-week-diff.sh
  audit-cron:
    image: node:20-alpine
    container_name: ace_audit_cron
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URL: "mongodb://ace:${MONGO_PASSWORD}@mongodb:27017/ace_trading?authSource=admin"
      TZ: UTC
    command:
      - sh
      - -c
      - |
        mkdir -p /app/notes/audits /etc/crontabs &&
        cp /app/scripts/audit/audit-cron.crontab /etc/crontabs/root &&
        echo 'audit-cron: crontab installed, starting crond (Wed 13:00 UTC)' &&
        crond -f -l 8

volumes:
  mongo_data:
    driver: local
